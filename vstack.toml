# vstack.toml — skill/hook mapping configuration
# The CLI reads this from the source repo root during installation.
#
# [agent-skills] is the single source of truth for which skills appear in each
# agent's frontmatter.  When an agent has an explicit entry here, prefix matching
# is skipped — only the listed skills (plus role-skills) are attached.
# Removing a skill from an agent's list and running `vstack refresh` removes it
# from that agent's frontmatter.
#
# Agents without an entry here still use automatic prefix matching (agent "foo" → skills "foo-*").

# Skill mappings per agent — always loaded into context
[agent-skills]
rust = ["rust-arch", "rust-cargo", "rust-conventions", "rust-safety"]
iced = ["iced-rs"]
reviewer-arch = ["rust-arch", "decider"]
reviewer-perf = ["perf-profiling", "perf-latency"]
reviewer-safety = ["rust-safety"]
reviewer-structure = ["rust-arch"]
reviewer-test = ["rust-conventions"]
generalist = [
    "decider",
    "github",
    "issue-lifecycle",
    "linear",
    "worktree",
]
reviewer-doc = [
    "issue-lifecycle",
    "linear",
    "decider",
]
reviewer-error = [
    "issue-lifecycle",
    "linear",
]
reviewer-security = [
    "issue-lifecycle",
    "linear",
]
tpm = [
    "decider",
    "github",
    "issue-lifecycle",
    "linear",
    "project-management",
    "worktree",
]

# Specialist skills — loaded on demand when the task matches
[agent-skills-optional]
rust = [
  { skill = "rust-async", when = "Async code, tokio, futures, channels, or cancellation" },
  { skill = "rust-cross", when = "Cross-compilation or non-native target architectures" },
  { skill = "rust-debugging", when = "Debugging crashes, memory issues, or using GDB/LLDB" },
  { skill = "rust-ffi", when = "FFI boundaries, C interop, bindgen, or repr(C)" },
  { skill = "rust-no-std", when = "Embedded targets, no_std, or custom allocators" },
  { skill = "second-opinion", when = "Cross-model code review, adversarial challenge, or second opinion from another AI" },
]
generalist = [
  { skill = "second-opinion", when = "Cross-model code review, adversarial challenge, or second opinion from another AI" },
]
iced = [
  { skill = "price-handling", when = "Price display, order entry, tick sizes, or feed parsing" },
  { skill = "trading-design", when = "UI layout design, typography, color, or visual density" },
  { skill = "iced-shadcn", when = "Implementing or auditing shadcn-inspired component families" },
  { skill = "second-opinion", when = "Cross-model code review, adversarial challenge, or second opinion from another AI" },
]
reviewer-perf = [
  { skill = "perf-cache", when = "Cache optimization, CPU cache behavior, or coherency" },
  { skill = "perf-ebpf", when = "eBPF profiling, bpftrace, or kernel-level observation" },
  { skill = "perf-lock-free", when = "Atomic operations, lock-free data structures, or hazard pointers" },
  { skill = "perf-simd", when = "SIMD intrinsics, auto-vectorization, or target features" },
  { skill = "perf-threading", when = "Thread pools, work-stealing, or thread-local storage" },
  { skill = "perf-zero-alloc", when = "Object pools, arena allocators, or allocation-sensitive paths" },
]

# Skills given to all agents of a role
[role-skills]
engineer = ["issue-lifecycle", "github", "worktree", "decider", "linear"]
manager = ["issue-lifecycle", "github", "worktree", "project-management", "linear", "decider"]
reviewer = ["issue-lifecycle", "linear"]

# Hook assignment by event:matcher → roles
# "all" assigns to every role. Otherwise list specific roles.
[hook-events]
"PreToolUse:Bash" = "all"
"PostToolUse:Edit|Write" = ["engineer"]
"TaskCompleted:" = ["engineer"]

[agent-guidance]
generalist = ""
reviewer-doc = ""
reviewer-error = ""
reviewer-security = ""
tpm = ""

[agent-instructions]
generalist = ""
reviewer-doc = ""
reviewer-error = ""
reviewer-security = ""
tpm = ""

[skill-instructions]
decider = ""
flightdeck = ""
github = ""
iced-rs = ""
iced-shadcn = ""
issue-lifecycle = ""
linear = ""
orchestration = ""
perf-cache = ""
perf-ebpf = ""
perf-latency = ""
perf-lock-free = ""
perf-profiling = ""
perf-simd = ""
perf-threading = ""
perf-zero-alloc = ""
price-handling = ""
project-management = ""
rust-arch = ""
rust-async = ""
rust-cargo = ""
rust-conventions = ""
rust-cross = ""
rust-debugging = ""
rust-ffi = ""
rust-no-std = ""
rust-safety = ""
trading-design = ""
worktree = ""

# ── Installed skills (reference) ─────────────────────
#   decider
#   flightdeck
#   github
#   iced-rs
#   iced-shadcn
