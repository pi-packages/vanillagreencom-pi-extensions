[agent-additional-instructions]
iced = "### UI Rules
- **No inline styles**: Never hardcode colors, icon colors, sizes, spacing, font sizes, icon sizes, radii, or border widths directly in widget or viewer code. Always use shared tokens (`TOKENS.*`), typography roles (`TypographyRole::*`), or established design constants/helpers (`BORDER_WIDTHS.*`, `SHARP_RADIUS`).
- **SVG icon source policy**: When adding or replacing SVG icons for Iced UI work, source them from `lucide.dev` v1 icons by default. Explicit project-provided brand assets (for example GitHub) are allowed exceptions when intentionally documented; otherwise do not pull SVG icon assets from other icon libraries or versions.
- **No raw font access**: Never use `FONT_SANS`, `FONT_MONO`, or `tokens.type_scale.*` directly in UI code. Prefer shared text builders like `ds_text(...)` and shared widget builders; when you need custom text composition, go through `TypographyRole::*`. If no role exists for your use case, add one.
- **Reuse components**: Use shared widget primitives (card, badge, button, icon_button, text_input, input_group, separator, toggle_group, select, alert, etc.) instead of rebuilding equivalent UI with raw containers and styling. If a shared component is close but missing a modifier, add the modifier to the component. For inline clickable text, compose `typography::text_link_span` into `rich_text!` — there is no standalone `text_link` widget.
- **Token names match code paths**: Display names on showcase/token pages must match the exact Rust access path (for example, `type_scale.sm`, not `size.sm`). This keeps references unambiguous for both humans and AI agents.
- **New visual values get tokens**: When adding a new color, size, spacing, border width, radius, or icon extent, add it to the token system with a test and showcase entry — never leave it as a local const or magic number. If it fits an existing scale (`BorderWidthScale`, `type_scale`, `spacing`, etc.), use that scale instead of creating a near-duplicate token.
- **Consumer-first design**: Every widget and component must be architected for the consumer. Builder APIs should be ergonomic, discoverable, and composable. Scope render-mode-specific behavior (for example, `GroupSegment` vs `Standalone`) so changes to one mode never regress another. Avoid inline hacks — if something requires special layout or behavior, solve it at the widget level with a clean abstraction consumers can rely on. Components should be easy to use correctly and hard to use incorrectly.
- **Overlay viewport contract**: When implementing an `iced::overlay::Overlay` struct, never store and forward the `viewport: Rectangle` captured from your parent widget's `overlay()` call when invoking descendant `Widget::update`/`Widget::draw`/`Widget::mouse_interaction`/`Widget::overlay` trait calls on the popup content — always pass `Rectangle::INFINITE` instead. The overlay's own `Overlay::layout()` may still use its `bounds: Size` parameter for its own coordinate space; the rule applies only to viewports propagated to descendant widgets. iced's `scrollable::overlay` forwards `bounds.intersection(viewport)` and iced_wgpu's per-paragraph text scissor turns inherited clips into invisible text. See `docs/architecture/iced-ui.md` Overlay System."
